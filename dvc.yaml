stages:
  collect:
    cmd: python src/collect.py
    outs:
      - data/raw/

  preprocess:
    cmd: python src/preprocess.py
    deps:
      - data/raw/
      - src/preprocess.py
    outs:
      - data/processed/data.csv

  train:
    cmd: python src/train.py
    deps:
      - data/processed/data.csv
      - src/train.py
    outs:
      - model.pkl
    metrics:
      - metrics.json